@if (visible) {
<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    @if (mode === 'edit') {
    <h2>Edit Product</h2>
    } @else {
    <h2>Add New Product</h2>
    }
    <form class="stack" (ngSubmit)="submit()">
      <input type="text" [(ngModel)]="form.name" name="name" placeholder="Product Name" required />
      <select [(ngModel)]="form.category" name="category">
        <option>Premium</option>
        <option>Medicinal</option>
        <option>Raw/Organic</option>
      </select>
      <input type="number" [(ngModel)]="form.price" name="price" placeholder="Price" required />
      <input type="number" [(ngModel)]="form.stock" name="stock" placeholder="Stock" required />

      <div class="image-mode">
        <label class="image-mode-option">
          <input
            type="radio"
            name="imageMode"
            [ngModel]="imageMode"
            (ngModelChange)="switchImageMode('url')"
            value="url"
          />
          Image URL
        </label>
        <label class="image-mode-option">
          <input
            type="radio"
            name="imageMode"
            [ngModel]="imageMode"
            (ngModelChange)="switchImageMode('upload')"
            value="upload"
          />
          Upload image
        </label>
      </div>

      @if (imageMode === 'url') {
      <input type="url" [(ngModel)]="form.imageUrl" name="imageUrl" placeholder="https://... (optional)" />
      }

      @if (imageMode === 'upload') {
      <input type="file" accept="image/*" (change)="onImageFileSelected($event)" />
      <small class="help-text">Max size: 2MB</small>
      }

      @if (imageError) {
      <p class="error-text">{{ imageError }}</p>
      }

      @if (form.imageUrl) {
      <img class="image-preview" [src]="form.imageUrl" alt="Preview" />
      }
      <div class="modal-actions">
        <button type="submit" class="primary-btn">
          @if (mode === 'edit') { Save Changes } @else { Add Product }
        </button>
        <button type="button" (click)="close.emit()">Cancel</button>
      </div>
    </form>
  </div>
</div>
}
