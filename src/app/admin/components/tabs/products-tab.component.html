<div class="section-head">
  <h2>Product Management</h2>
  <button type="button" class="primary-btn" (click)="addProduct.emit()">+ Add Product</button>
</div>
<table>
  <thead>
    <tr>
      <th>Image</th>
      <th>Product Name</th>
      <th>Category</th>
      <th>Price</th>
      <th>Stock</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (product of products; track product.id) {
    <tr>
      <td>
        @if (product.imageUrl) {
        <img class="admin-thumb" [src]="product.imageUrl" [alt]="product.name" loading="lazy" />
        } @else {
        <span class="admin-thumb placeholder"></span>
        }
      </td>
      <td>{{ product.name }}</td>
      <td>{{ product.category }}</td>
      <td>{{ product.price }}</td>
      <td><span class="badge" [class.warn]="product.stock < 50">{{ product.stock }} in stock</span></td>
      <td>
        <button type="button" class="small-btn" (click)="editProduct.emit(product)">Edit</button>
        <button type="button" class="small-btn danger" (click)="deleteProduct.emit(product.id)">Delete</button>
      </td>
    </tr>
    }
  </tbody>
</table>
