<div class="stats">
  <article class="card">
    <p>Total Orders</p>
    <h3>{{ analytics?.totalOrders ?? 0 }}</h3>
    <small>Last 30 days</small>
  </article>
  <article class="card">
    <p>Total Revenue</p>
    <h3>&#8377;{{ analytics?.totalRevenue ?? 0 }}</h3>
    <small>Last 30 days</small>
  </article>
  <article class="card">
    <p>Active Users</p>
    <h3>{{ activeUsers }}</h3>
    <small>Currently active</small>
  </article>
  <article class="card">
    <p>Avg Rating</p>
    <h3>{{ analytics?.averageRating ?? 0 }}</h3>
    <small>Storewide</small>
  </article>
</div>
