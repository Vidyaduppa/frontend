<div class="stats">

    <p>Total Orders</p>
    <h3>{{ analytics?.totalOrders ?? 0 }}</h3>
    <small>From backend</small>
  </article>
  <article class="card">
    <p>Total Revenue</p>
    <h3>${{ analytics?.totalRevenue ?? 0 }}</h3>

  <article class="card">

  <article class="card">
